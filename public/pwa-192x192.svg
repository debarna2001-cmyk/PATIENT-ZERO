<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <!-- Definition for glows -->
  <defs>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" fill="#061126" />
  
  <!-- Outer glowing border -->
  <rect x="24" y="24" width="464" height="464" fill="none" stroke="#00f0ff" stroke-width="6" rx="90" filter="url(#glow)" opacity="0.6"/>

  <!-- Heart and ECG continuous line -->
  <path 
    d="M 210,330 
       C 80,210 120,110 170,110 
       C 195,110 210,140 210,140 
       C 210,140 225,110 250,110 
       C 285,110 320,150 290,220
       L 290,250
       L 310,250 
       L 330,170 
       L 360,340 
       L 380,210 
       L 400,250 
       L 440,250
       A 6 6 0 0 0 446 244"
    fill="none" 
    stroke="#00f0ff" 
    stroke-width="16" 
    stroke-linecap="round" 
    stroke-linejoin="round" 
    filter="url(#glow)"
  />
  
  <circle cx="440" cy="250" r="10" fill="#00f0ff" filter="url(#glow)"/>
</svg>
